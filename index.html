<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.B.D - My </title>
    <!-- تعديل رابط CSS ليتوافق مع المجلد MD -->
    <link rel="stylesheet" href="css/css.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- النجوم المتحركة في الخلفية -->
    <div class="stars"></div>
    <div class="twinkling"></div>
    
    <!-- الزهور المتساقطة -->
    <div class="flowers-container">
        <div class="flower">🌸</div>
        <div class="flower">🌼</div>
        <div class="flower">🌻</div>
        <div class="flower">🌺</div>
        <div class="flower">🌸</div>
        <div class="flower">🌼</div>
    </div>

    <div class="container">
        <!-- الكعكة مع الشموع -->
        <div class="cake">
            <div class="candle"></div>
            <div class="candle"></div>
            <div class="candle"></div>
            <div class="candle"></div>
            <div class="candle"></div>
        </div>

        <!-- النص الرئيسي مع الأنميشن -->
        <h1 class="birthday-title">
            <span>D</span>
            <span>.</span>
            <span>B</span>
            <span>.</span>
            <span>H</span>
        </h1>

        <!-- الاسم مع التوهج الذهبي -->
        <div class="name-container">
            <h2 class="glowing-name">Ghufran</h2>
            <div class="sparkles"></div>
        </div>

        <!-- البالونات المتحركة -->
        <div class="balloons">
            <div class="balloon red"></div>
            <div class="balloon blue"></div>
            <div class="balloon green"></div>
            <div class="balloon yellow"></div>
            <div class="balloon purple"></div>
        </div>

        <!-- الزر مع الأنميشن -->
        <button class="love-button" onclick="showLoveMessage()">
            <span class="heart">❤️</span>
            Click here
            <span class="heart">❤️</span>
        </button>

        <!-- رسالة الحب المخفية -->
        <div id="loveMessage" class="love-message hidden">
            <div class="message-content">
                <div class="big-heart">💝</div>
                <p class="message-text">احبك يا اجمل من يكبر</p>
                <p class="message-text-glow">❤</p>
                <div class="floating-hearts">
                    <span>❤️</span>
                    <span>💖</span>
                    <span>💗</span>
                    <span>💓</span>
                    <span>💕</span>
                </div>
            </div>
        </div>

        <!-- رسالة تهنئة إضافية -->
        <div class="extra-message">
            <p class="poem">
                كل عام وانت بألف خير<br>
                يا اغلى من في الوجود<br>
                عمر مديد وسعادة تغمر القلب<br>
                وضحكة لا تفارق الشفاه
            </p>
        </div>
    </div>

    <!-- تعديل رابط JS ليتوافق مع المجلد MD -->
    <script src="js/js.js"></script>
</body>
</html>
